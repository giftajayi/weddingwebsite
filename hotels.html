<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hotels | Gbemi & Funto</title>

<link rel="stylesheet" href="style.css">

<style>

body{
    background:#FFF8F2;
    font-family:Georgia, serif;
    margin:0;
    padding:0;
}

section{
    padding:60px 20px;
}

h1{
    text-align:center;
    color:#800020;
    font-size:3rem;
    margin-bottom:50px;
}

.cards{
    max-width:900px;
    margin:auto;
    display:flex;
    flex-direction:column;
    gap:30px;
}

.card{
    background:white;
    border-left:8px solid #D4AF37;
    border-radius:18px;
    padding:40px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.card h3{
    color:#800020;
    font-size:2rem;
    margin-bottom:15px;
}

.card p{
    font-size:1.3rem;
    color:#555;
    margin:0;
}

</style>

</head>

<body>

<section>

<h1>Nearby Hotels</h1>

<div class="cards">

    <div class="card">
        <h3>Ojaja Suites</h3>
        <p>Akure, Ondo State</p>
    </div>

    <div class="card">
        <h3>Fontel Luxury Hotel & Suites</h3>
        <p>Akure, Ondo State</p>
    </div>

    <div class="card">
        <h3>Grand Capital Hotel</h3>
        <p>Akure, Ondo State</p>
    </div>

    <div class="card">
        <h3>Sunview Hotel Akure</h3>
        <p>Akure, Ondo State</p>
    </div>

</div>

</section>

</body>

</html>
