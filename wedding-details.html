<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hotels | Gbemi & Funto</title>

<link rel="stylesheet" href="style.css">

<style>

body {
    background: #FFF8F2;
    font-family: Georgia, serif;
    margin: 0;
    padding: 0;
}

section {
    padding: 70px 25px;
}

h1 {
    text-align: center;
    color: #800020;
    font-size: 3.2rem;
    margin-bottom: 60px;
}


.cards {

    max-width: 1000px;
    margin: auto;
    display: flex;
    flex-direction: column;
    gap: 35px;

}


.card {

    background: white;

    border-left: 10px solid #D4AF37;

    border-radius: 20px;

    padding: 55px;

    box-shadow: 0 12px 30px rgba(0,0,0,0.1);

    text-align: center;

}


.card h3 {

    color: #800020;

    font-size: 2.5rem;

    margin-bottom: 20px;

}


.card p {

    font-size: 1.5rem;

    color: #555;

    margin: 0;

}



@media(max-width:768px){

    h1{
        font-size:2.5rem;
    }


    .card{

        padding:35px;

    }


    .card h3{

        font-size:2rem;

    }


    .card p{

        font-size:1.2rem;

    }

}

</style>

</head>


<body>


<section>


<h1>
Nearby Hotels
</h1>


<div class="cards">


<div class="card">

<h3>
Ojaja Suites
</h3>

<p>
Akure, Ondo State
</p>

</div>



<div class="card">

<h3>
Fontel Luxury Hotel & Suites
</h3>

<p>
Akure, Ondo State
</p>

</div>



<div class="card">

<h3>
Grand Capital Hotel
</h3>

<p>
Akure, Ondo State
</p>

</div>



<div class="card">

<h3>
Sunview Hotel Akure
</h3>

<p>
Akure, Ondo State
</p>

</div>



</div>


</section>


</body>

</html>
