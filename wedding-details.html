<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Details | Gbemi & Funto</title>

<link rel="stylesheet" href="style.css">

<style>

body {
    background: #FFF8F2;
    font-family: Georgia, serif;
    margin: 0;
    padding: 0;
}


section {
    padding: 70px 25px;
}


h1 {
    text-align: center;
    color: #800020;
    font-size: 3.2rem;
    margin-bottom: 60px;
}


.cards {

    max-width: 1000px;
    margin: auto;
    display: flex;
    flex-direction: column;
    gap: 35px;

}


.card {

    background: white;

    border-left: 10px solid #D4AF37;

    border-radius: 20px;

    padding: 55px;

    text-align: center;

    box-shadow: 0 12px 30px rgba(0,0,0,0.1);

}



.card h3 {

    color: #800020;

    font-size: 2.5rem;

    margin-bottom: 25px;

}



.card p {

    font-size: 1.5rem;

    color: #444;

    margin: 15px 0;

}



@media(max-width:768px){

    h1 {
        font-size: 2.5rem;
    }


    .card {

        padding: 35px;

    }


    .card h3 {

        font-size: 2rem;

    }


    .card p {

        font-size: 1.2rem;

    }

}

</style>

</head>


<body>


<section>


<h1>
Wedding Details
</h1>


<div class="cards">


<div class="card">

<h3>
Traditional Wedding
</h3>

<p>
📅 October 15, 2026
</p>

<p>
⏰ 8:00 AM
</p>

<p>
📍 BTO Hall, Akure
</p>

</div>



<div class="card">

<h3>
Wedding Ceremony
</h3>

<p>
⏰ 12:00 Noon
</p>

<p>
📍 RCCG Redemption Court
<br>
Ilesha Road, Akure
</p>

</div>




<div class="card">

<h3>
Reception Ceremony
</h3>

<p>
⏰ 2:30 PM
</p>

<p>
📍 BTO Hall, Akure
</p>

</div>


</div>


</section>


</body>

</html>
